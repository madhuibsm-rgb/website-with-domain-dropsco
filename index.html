<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Drops Co. — Coming Soon</title>
  <meta name="description" content="The Drops Co. — Dropping into your day soon. Join the list to be first." />
  <link rel="icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --gold:#f3c14c; --gold-soft:#f7d77f; --cream:#fbf6ec;
      --burgundy:#5b1f23; --ink:#2a2422; --taupe:#9a7f62; --line:#e8ddc8;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      background:var(--gold);
      font-family:"Jost",system-ui,sans-serif;
      color:var(--ink);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
      -webkit-font-smoothing:antialiased;
      position:relative;overflow:hidden;
    }
    body::before,body::after{
      content:"";position:absolute;background:rgba(255,255,255,.12);
      transform:rotate(18deg);border-radius:40px;pointer-events:none;
    }
    body::before{width:520px;height:520px;top:-160px;left:-120px;}
    body::after{width:420px;height:420px;bottom:-160px;right:-100px;transform:rotate(-12deg);}

    .card{
      position:relative;z-index:1;width:min(1040px,100%);
      background:var(--cream);border-radius:28px;
      box-shadow:0 40px 90px rgba(74,30,20,.18);
      padding:clamp(28px,4vw,56px);
      opacity:0;transform:translateY(14px);
      animation:rise 1.1s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .brand{display:flex;align-items:center;gap:9px;margin-bottom:clamp(20px,3vw,36px);}
    .brand .dot{width:14px;height:18px;background:var(--burgundy);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;transform:rotate(-8deg);}
    .brand span{font-family:"Jost",sans-serif;font-weight:500;letter-spacing:.22em;text-transform:uppercase;font-size:.82rem;color:var(--burgundy);}

    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(24px,4vw,48px);align-items:center;}

    .eyebrow{font-family:"Jost",sans-serif;font-weight:400;letter-spacing:.34em;text-transform:uppercase;font-size:.78rem;color:var(--taupe);margin-bottom:1.1rem;}
    h1{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:clamp(2.1rem,5.2vw,3.4rem);line-height:1.08;color:var(--burgundy);margin-bottom:1rem;}
    h1 em{font-style:italic;color:var(--gold);font-weight:500;}
    .lead{font-family:"Jost",sans-serif;font-weight:300;font-size:clamp(1rem,2.4vw,1.12rem);line-height:1.6;color:var(--ink);max-width:32ch;margin-bottom:1.8rem;}

    form{display:flex;gap:10px;flex-wrap:wrap;max-width:440px;}
    input[type=email]{
      flex:1;min-width:200px;padding:14px 18px;border:1px solid var(--line);
      border-radius:12px;background:#fff;font-family:"Jost",sans-serif;font-size:1rem;color:var(--ink);
    }
    input[type=email]:focus{outline:none;border-color:var(--burgundy);box-shadow:0 0 0 3px rgba(91,31,35,.12);}
    button{
      padding:14px 26px;border:none;border-radius:12px;background:var(--burgundy);color:var(--cream);
      font-family:"Jost",sans-serif;font-weight:500;font-size:1rem;letter-spacing:.02em;cursor:pointer;transition:transform .15s,background .2s;
    }
    button:hover{background:#471619;transform:translateY(-1px);}
    button:disabled{opacity:.6;cursor:default;transform:none;}
    .note{font-family:"Jost",sans-serif;font-size:.82rem;color:var(--taupe);margin-top:.9rem;min-height:1.2em;}
    .note.ok{color:#3b6d11;}

    .social{margin-top:2rem;}
    .social p{font-family:"Jost",sans-serif;font-weight:400;letter-spacing:.28em;text-transform:uppercase;font-size:.7rem;color:var(--taupe);margin-bottom:.7rem;}
    .social a{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--line);border-radius:50%;margin-right:8px;color:var(--burgundy);transition:background .2s,color .2s;}
    .social a:hover{background:var(--burgundy);color:var(--cream);}
    .social svg{width:16px;height:16px;fill:currentColor;}

    .visual{position:relative;display:flex;align-items:center;justify-content:center;min-height:240px;}
    .blob{position:absolute;width:88%;max-width:380px;aspect-ratio:1/1;background:var(--gold-soft);border-radius:46% 54% 49% 51%/55% 47% 53% 45%;z-index:0;}
    .visual img{position:relative;z-index:1;width:min(360px,84%);height:auto;border-radius:12px;}

    @keyframes rise{to{opacity:1;transform:translateY(0);}}
    @media (max-width:760px){
      .grid{grid-template-columns:1fr;}
      .visual{order:-1;min-height:200px;}
      form{max-width:none;}
    }
    @media (prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none;}}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><span class="dot"></span><span>The Drops Co.</span></div>
    <div class="grid">
      <section>
        <p class="eyebrow">Coming Soon</p>
        <h1>Good things are <em>dropping</em> soon.</h1>
        <p class="lead">Thoughtfully crafted supplements for focus, energy, and everyday balance. Join the list and be first to know when we launch.</p>

        <form id="notify" novalidate>
          <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email" />
          <button type="submit">Notify me</button>
        </form>
        <p class="note" id="note"></p>

        <div class="social">
          <p>Follow along</p>
          <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 1.2.1 1.8.3 2.2.4.6.2 1 .4 1.4.9.5.4.7.8.9 1.4.1.4.3 1 .4 2.2.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 1.8-.4 2.2-.2.6-.4 1-.9 1.4-.4.5-.8.7-1.4.9-.4.1-1 .3-2.2.4-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-1.8-.3-2.2-.4-.6-.2-1-.4-1.4-.9-.5-.4-.7-.8-.9-1.4-.1-.4-.3-1-.4-2.2C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.9c.1-1.2.3-1.8.4-2.2.2-.6.4-1 .9-1.4.4-.5.8-.7 1.4-.9.4-.1 1-.3 2.2-.4C8.4 2.2 8.8 2.2 12 2.2Zm0 1.8c-3.1 0-3.5 0-4.7.1-1.1.1-1.7.2-2.1.4-.5.2-.9.4-1.3.8-.4.4-.6.8-.8 1.3-.2.4-.3 1-.4 2.1-.1 1.2-.1 1.6-.1 4.7s0 3.5.1 4.7c.1 1.1.2 1.7.4 2.1.2.5.4.9.8 1.3.4.4.8.6 1.3.8.4.2 1 .3 2.1.4 1.2.1 1.6.1 4.7.1s3.5 0 4.7-.1c1.1-.1 1.7-.2 2.1-.4.5-.2.9-.4 1.3-.8.4-.4.6-.8.8-1.3.2-.4.3-1 .4-2.1.1-1.2.1-1.6.1-4.7s0-3.5-.1-4.7c-.1-1.1-.2-1.7-.4-2.1-.2-.5-.4-.9-.8-1.3-.4-.4-.8-.6-1.3-.8-.4-.2-1-.3-2.1-.4-1.2-.1-1.6-.1-4.7-.1Zm0 3.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8Zm0 1.8a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2Zm5.1-.3a1.15 1.15 0 1 1-2.3 0 1.15 1.15 0 0 1 2.3 0Z"/></svg></a>
          <a href="#" aria-label="TikTok"><svg viewBox="0 0 24 24"><path d="M16.5 3c.3 2 1.5 3.6 3.5 3.9v2.4c-1.2.1-2.4-.2-3.5-.8v5.8c0 3.3-2.6 5.7-5.7 5.7A5.6 5.6 0 0 1 5.3 14c0-3.1 2.7-5.6 5.9-5.3v2.5c-.4-.1-.8-.2-1.1-.2-1.6 0-2.9 1.3-2.9 3s1.3 2.9 2.9 2.9 2.9-1.3 2.9-3V3h3.5Z"/></svg></a>
          <a href="#" aria-label="Facebook"><svg viewBox="0 0 24 24"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V7.9c0-.9.3-1.5 1.6-1.5h1.6V3.6c-.3 0-1.2-.1-2.3-.1-2.3 0-3.9 1.4-3.9 4v2.3H7.8V13h2.7v8h3Z"/></svg></a>
        </div>
      </section>

      <section class="visual">
        <div class="blob"></div>
        <img src="logo.png" alt="The Drops Co." />
      </section>
    </div>
  </main>

  <script>
    /* Email capture → Google Sheets.
       Set up a Google Apps Script web app (see GOOGLE-SHEETS-SETUP.md), then
       paste its deployment URL below. It looks like:
       https://script.google.com/macros/s/AKfycb..../exec  */
    var SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbw7qLYZOLTO-6_9Td2tI1U0JUdS_V6alMETeIAp5UR3EE0V68ebU4EuXq2WU9z_Wbx-/exec";

    var form = document.getElementById('notify');
    var note = document.getElementById('note');
    var button = form.querySelector('button');

    form.addEventListener('submit', function(e){
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
        note.className = 'note'; note.textContent = 'Please enter a valid email address.'; return;
      }
      if(SHEET_ENDPOINT.indexOf('PASTE_YOUR') !== -1){
        note.className = 'note ok'; note.textContent = "Thank you for your Interest. You're on the list!";
        form.reset(); return;
      }
      button.disabled = true;
      note.className = 'note'; note.textContent = 'Adding you to the list…';
      /* mode:'no-cors' + URLSearchParams sends a "simple" request with no CORS
         preflight, so it reaches Apps Script. The response is opaque, so a
         completed request is treated as success. */
      fetch(SHEET_ENDPOINT, {
        method:'POST',
        mode:'no-cors',
        body:new URLSearchParams({ email: email })
      }).then(function(){
        note.className='note ok'; note.textContent="You're on the list — we'll be in touch.";
        form.reset();
      }).catch(function(){
        note.className='note'; note.textContent='Something went wrong. Please try again.';
      }).finally(function(){
        button.disabled = false;
      });
    });
  </script>
</body>
</html>
